version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:6.0
    container_name: chat-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - chat-network

  # Node.js Chat Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chat-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/realtime-chatapp
      - JWT_SECRET=supersecretjwtkey12345!
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - chat-network

  # React Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://localhost:5000}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-448322085675-mn74tf7b227dq6sqrj255cajc0gmiin9.apps.googleusercontent.com}
    container_name: chat-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - chat-network

  # REDIS SERVICE (Optional: Scaffolding ready for future scaling!)
  # To enable Redis scaling, uncomment the following service block and configure
  # socket.io-redis adapter in backend/socket/socketHandler.js.
  # redis:
  #   image: redis:7-alpine
  #   container_name: chat-redis
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - chat-network

volumes:
  mongo-data:

networks:
  chat-network:
    driver: bridge
